<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face 3D Mesh App</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1>Face 3D Mesh App</h1>

            <div class="control-group">
                <label for="imageInput">Subir fotografía</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <div class="control-group">
                <button id="uploadButton">Validar imagen</button>
            </div>

            <div class="control-group">
                <button id="detectButton">Generar malla 2D</button>
            </div>

            <div class="control-group">
                <button id="projectButton">Proyectar malla 3D</button>
            </div>

            <div class="control-group">
                <label for="rotationA">Rotación horizontal (a)</label>
                <input type="range" id="rotationA" min="-3.14" max="3.14" step="0.05" value="0">
            </div>

            <div class="control-group">
                <label for="rotationB">Rotación vertical (b)</label>
                <input type="range" id="rotationB" min="-1.57" max="1.57" step="0.05" value="0">
            </div>

            <div class="control-group">
                <label for="distanceInput">Zoom / distancia (D)</label>
                <input type="range" id="distanceInput" min="200" max="1200" step="10" value="500">
            </div>

            <div class="control-group">
                <div id="uploadStatus" class="status-box">Sin imagen cargada.</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="panels-grid">
                <section class="panel">
                    <h2>Imagen real</h2>
                    <img id="imagePreview" class="preview-image" alt="Vista previa de imagen">
                </section>

                <section class="panel">
                    <h2>Respuesta del backend</h2>
                    <div id="backendResponse" class="status-box">Esperando acción...</div>
                </section>

                <section class="panel">
                    <h2>Malla 2D sobre rostro</h2>
                    <canvas id="landmarkCanvas" class="landmark-canvas"></canvas>
                </section>

                <section class="panel">
                    <h2>Proyección 3D</h2>
                    <canvas id="projectionCanvas" class="landmark-canvas"></canvas>
                </section>
            </div>
        </main>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
